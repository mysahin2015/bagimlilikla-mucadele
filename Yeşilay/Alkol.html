<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alkol Bağımlılığı Farkındalık Testi</title>

    <style>
        body {
            background-color: #f0f7f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 17px;
            line-height: 1.6;
            margin: 40px auto;
            max-width: 650px;
            padding: 20px;
            color: #2d3436;
        }

        .container {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(31, 106, 56, 0.1);
            border-top: 8px solid #1f6a38;
        }

        h1 {
            color: #1f6a38;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #558b2f;
            margin-bottom: 30px;
            font-size: 15px;
            font-weight: 500;
        }

        .question-block {
            margin-bottom: 25px;
            padding: 18px;
            border-radius: 12px;
            background-color: #ffffff;
            border: 1px solid #e0eadd;
            transition: all 0.3s ease;
        }

        .question-block:hover {
            border-color: #a5d6a7;
            background-color: #f9fff9;
            transform: translateX(5px);
        }

        label.question-text {
            font-weight: 600;
            display: block;
            margin-bottom: 15px;
            color: #1b4d2e;
        }

        .options-group {
            display: flex;
            gap: 20px;
        }

        .option {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
            padding: 8px 15px;
            border-radius: 20px;
            background-color: #f1f8e9;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .option:hover {
            background-color: #dcedc8;
            border-color: #1f6a38;
        }

        input[type="radio"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1f6a38;
        }

        #submit-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background-color: #1f6a38;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            margin-top: 30px;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(31, 106, 56, 0.3);
        }

        /* SONUÇ KUTUSU STİLLERİ */
        #result-box {
            display: none;
            background-color: #ffffff;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            border: 2px solid #1f6a38;
            animation: fadeIn 0.6s ease;
        }

        #res-title { color: #1f6a38; text-align: center; margin-bottom: 15px; }
        #res-score { display: block; text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #d32f2f; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-note {
            font-size: 13px;
            color: #6d8c78;
            text-align: center;
            margin-top: 25px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .header-icon {
            display: flex;
            margin: 0 auto 15px;
            width: 50px;
            height: 50px;
            background-color: #1f6a38;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .back-link {
            font-size: 200%;
            text-decoration: none;
            color: #1f6a38;
        }
    </style>
</head>
<body>

<div class="container">
    <a class="back-link" href="Adsoyad.html">&#8617;</a>
    <div class="header-icon">✓</div>
    <h1>ALKOL TESTİ</h1>
    <p class="subtitle">Sağlıklı seçimler, özgür yarınlar.</p>

    <form id="alkolTesti">
        <div class="question-block">
            <label class="question-text">1. Sosyal ortamlarda alkol tüketmeden rahat eğlenemediğinizi düşündüğünüz oluyor mu?</label>
            <div class="options-group">
                <label class="option"><input type="radio" name="q1" value="10" required> Evet</label>
                <label class="option"><input type="radio" name="q1" value="0"> Hayır</label>
            </div>
        </div>

        <div class="question-block">
            <label class="question-text">2. Son zamanlarda eskisine göre daha sık alkol tükettiğinizi fark ettiniz mi?</label>
            <div class="options-group">
                <label class="option"><input type="radio" name="q2" value="10"> Evet</label>
                <label class="option"><input type="radio" name="q2" value="0"> Hayır</label>
            </div>
        </div>

        <div class="question-block">
            <label class="question-text">3. Moraliniz bozuk olduğunda alkol alma isteğiniz artıyor mu?</label>
            <div class="options-group">
                <label class="option"><input type="radio" name="q3" value="10"> Evet</label>
                <label class="option"><input type="radio" name="q3" value="0"> Hayır</label>
            </div>
        </div>

        <div class="question-block">
            <label class="question-text">4. Alkol tüketmediğiniz günlerde can sıkıntısı hissettiğiniz oluyor mu?</label>
            <div class="options-group">
                <label class="option"><input type="radio" name="q4" value="10"> Evet</label>
                <label class="option"><input type="radio" name="q4" value="0"> Hayır</label>
            </div>
        </div>

        <div class="question-block">
            <label class="question-text">5. "Bugün içmeyeceğim" deyip sonradan fikir değiştirdiğiniz oluyor mu?</label>
            <div class="options-group">
                <label class="option"><input type="radio" name="q5" value="10"> Evet</label>
                <label class="option"><input type="radio" name="q5" value="0"> Hayır</label>
            </div>
        </div>

        <div class="question-block">
            <label class="question-text">6. Alkol nedeniyle ertesi gün yorgunluk veya performans düşüşü yaşadığınız oluyor mu?</label>
            <div class="options-group">
                <label class="option"><input type="radio" name="q6" value="10"> Evet</label>
                <label class="option"><input type="radio" name="q6" value="0"> Hayır</label>
            </div>
        </div>

        <div class="question-block">
            <label class="question-text">7. Çevrenizdeki insanlar alkol tüketiminiz hakkında yorum yaptı mı?</label>
            <div class="options-group">
                <label class="option"><input type="radio" name="q7" value="10"> Evet</label>
                <label class="option"><input type="radio" name="q7" value="0"> Hayır</label>
            </div>
        </div>

        <div class="question-block">
            <label class="question-text">8. Alkol tüketiminizin kontrolünüzden çıktığını düşündüğünüz anlar oldu mu?</label>
            <div class="options-group">
                <label class="option"><input type="radio" name="q8" value="10"> Evet</label>
                <label class="option"><input type="radio" name="q8" value="0"> Hayır</label>
            </div>
        </div>

        <div class="question-block">
            <label class="question-text">9. Alkol kullanımı nedeniyle önemli bir planı ertelediğiniz veya iptal ettiğiniz oldu mu?</label>
            <div class="options-group">
                <label class="option"><input type="radio" name="q9" value="10"> Evet</label>
                <label class="option"><input type="radio" name="q9" value="0"> Hayır</label>
            </div>
        </div>

        <div class="question-block">
            <label class="question-text">10. Kendinizi rahatlatmak veya kafanızı dağıtmak için alkole yöneldiğiniz oluyor mu?</label>
            <div class="options-group">
                <label class="option"><input type="radio" name="q10" value="10"> Evet</label>
                <label class="option"><input type="radio" name="q10" value="0"> Hayır</label>
            </div>
        </div>

        <button type="submit" id="submit-btn">ANALİZ ET VE SONUCU GÖR</button>
    </form>

    <div id="result-box">
        <h2 id="res-title"></h2>
        <span id="res-score"></span>
        <div id="res-suggestions"></div>
        <button onclick="window.location.reload()" style="margin-top:20px; padding:10px; cursor:pointer; background:#1f6a38; color:white; border:none; border-radius:5px; width:100%;">Testi Yenile</button>
    </div>
    
    <p class="footer-note">Bu test bir farkındalık aracıdır. Sağlığınız için bağımlılıklarla mücadele edin.</p>
</div>

<script>
    document.getElementById('alkolTesti').addEventListener('submit', function(event) {
        event.preventDefault();

        const formData = new FormData(this);
        let toplamPuan = 0;
        
        // Puanları topla
        for (let value of formData.values()) {
            toplamPuan += parseInt(value);
        }

        // Formu gizle, sonucu göster
        document.getElementById('alkolTesti').style.display = 'none';
        const resultBox = document.getElementById('result-box');
        resultBox.style.display = 'block';

        const resTitle = document.getElementById('res-title');
        const resScore = document.getElementById('res-score');
        const resSugg = document.getElementById('res-suggestions');

        resScore.innerText = "Bağımlılık Skorunuz: %" + toplamPuan;

        if (toplamPuan <= 30) {
            resTitle.innerText = "🌱 Düşük Seviye Bağımlılık";
            resSugg.innerHTML = `
                <ul style="list-style-type: '✔ '; padding-left: 20px;">
                    <li><b>Arkadaş Çevreni yenile:</b> Alkol odaklı ortamlardan uzak durmak iradeni güçlendirir.</li>
                    <li><b>Alkolü anımsatma:</b> Alkol tüketilen mekanlardan bir süre uzak durmayı dene.</li>
                    <li><b>Hobiler edin:</b> Spor veya yeni aktiviteler zihnini meşgul tutar.</li>
                </ul>`;
        } else if (toplamPuan <= 70) {
            resTitle.innerText = "⚠️ Orta Seviye Bağımlılık";
            resSugg.innerHTML = `
                <ul style="list-style-type: '✔ '; padding-left: 20px;">
                    <li><b>Tetikleyici Haritası:</b> Hangi duyguların seni alkole ittiğini fark et (stres, üzüntü vb.).</li>
                    <li><b>Profesyonel Destek:</b> Süreç zorlaştığında bir uzmandan destek almaktan çekinme.</li>
                    <li><b>ALO 191:</b> Uyuşturucu ve Alkol ile Mücadele Hattı'ndan bilgi alabilirsin.</li>
                    <li><b>Küçük Hedefler:</b> "Bir daha asla" yerine "Bugün içmeyeceğim" diyerek ilerle.</li>
                </ul>`;
        } else {
            resTitle.innerText = "⚠️ Yüksek Seviye Bağımlılık";
            resSugg.innerHTML = `
                <ul style="list-style-type: '✔ '; padding-left: 20px;">
                    <li><b>Tıbbi Destek Şart:</b> Vücudun alkol eksikliğine sert tepki verebilir, mutlaka doktor kontrolünde olmalısın.</li>
                    <li><b>Rehabilitasyon:</b> YEDAM veya AMATEM gibi merkezlerle iletişime geçmek hayatını kurtarabilir.</li>
                    <li><b>Çevreni Değiştir:</b> Seni alkole teşvik eden her türlü ortam ve kişiden tamamen uzaklaşmalısın.</li>
                </ul>`;
        }
    });
</script>

</body>
</html>
